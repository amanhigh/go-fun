# v3 config - explicit interface specification in mocks subdirectory
all: false
dir: '{{ .InterfaceDir }}/mocks'
filename: '{{ .InterfaceName }}.go'
structname: '{{ .InterfaceName }}'
pkgname: 'mocks'
template: testify
packages:
  "github.com/amanhigh/go-fun/components/kohan/repository":
    interfaces:
      AccountRepository:
  "github.com/amanhigh/go-fun/components/kohan/clients":
    config:
      all: true
  "github.com/amanhigh/go-fun/components/kohan/manager":
    config:
      all: true
  "github.com/amanhigh/go-fun/common/util":
    interfaces:
      Shutdown:
  "github.com/amanhigh/go-fun/components/fun-app/manager":
    config:
      all: true
  "github.com/amanhigh/go-fun/components/fun-app/dao":
    interfaces:
      EnrollmentDaoInterface:
  "github.com/amanhigh/go-fun/components/fun-app/publisher":
    interfaces:
      EnrollmentPublisher:
